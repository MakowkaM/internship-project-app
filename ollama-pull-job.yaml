apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ollama-pull
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until curl -sf http://ollama:11434; do sleep 5; done
              echo "Pulling model..."
              curl -X POST http://ollama:11434/api/pull -d '{"name":"llama3.2:3b"}'
              echo "Done."
