name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND: ${{ secrets.ECR_FRONTEND_REPO }}
  REPOSITORY_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker system prune
        run: |
          docker system prune -f
          docker container prune -f

      - name: Build & push backend
        run: |
          docker build -t $ECR_BACKEND ./backend
          docker tag $ECR_BACKEND:latest $REPOSITORY_URI/$ECR_BACKEND:${{ steps.tag.outputs.tag }}
          docker push $REPOSITORY_URI/$ECR_BACKEND:${{ steps.tag.outputs.tag }}

      - name: Build & push frontend
        run: |
          docker build -t $ECR_FRONTEND ./frontend
          docker tag $ECR_FRONTEND:latest $REPOSITORY_URI/$ECR_FRONTEND:${{ steps.tag.outputs.tag }}
          docker push $REPOSITORY_URI/$ECR_FRONTEND:${{ steps.tag.outputs.tag }}

  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DEPLOY_REPO }}
          token: ${{ secrets.GIT_TOKEN }}
          ref: main
          path: k8s-repo

      - name: List repo contents
        run: ls -la k8s-repo/

      - name: Update backend image tag
        run: |
          sed -i "s#REPOSITORY_URI/ECR_BACKEND_REPO:.*#$REPOSITORY_URI/$ECR_BACKEND:$IMAGE_TAG#g" k8s-repo/backend-deployment.yaml

      - name: Update frontend image tag
        run: |
          sed -i "s#REPOSITORY_URI/ECR_FRONTEND_REPO:.*#$REPOSITORY_URI/$ECR_FRONTEND:$IMAGE_TAG#g" k8s-repo/frontend-deployment.yaml

      - name: Commit and push
        run: |
          cd k8s-repo
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git add backend-deployment.yaml frontend-deployment.yaml
          git commit -m "Update images to version $IMAGE_TAG"
          git push origin main
